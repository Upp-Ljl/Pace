<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
  <title>Pace</title>
  <style>
    :root {
      /* Pace v0.1 mentor 色系 — 暖灰 / 茶色 / 莫兰迪绿，刻意远离 cairn 的 accent 蓝 */
      --bg:         #FAF7F2;
      --surface:    #F2EDE5;
      --border:     #D4C5B3;
      --text:       #2C2825;
      --text-muted: #6B6359;
      --accent:     #7A8B6B;  /* 莫兰迪绿 */
      --accent-ink: #4F5A45;
      --mentor:     #8B7355;  /* 茶色 — mentor message bubble */
      --user:       #B8A89A;  /* 暖灰 — user message bubble */
      --shadow:     0 1px 2px rgba(44, 40, 37, 0.08);
      --radius:     12px;
      --gap:        12px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header — minimal, just product name + project pill */
    .header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: var(--gap);
    }
    .header .brand {
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--mentor);
    }
    .header .brand small {
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 8px;
      font-size: 13px;
    }
    .header .pill {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--bg);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Chat list */
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.mentor {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border-left: 3px solid var(--mentor);
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      max-width: 90%;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
      box-shadow: none;
      padding: 4px 10px;
    }
    .msg .ts {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      opacity: 0.7;
    }

    /* Input bar */
    .input-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-bar textarea {
      flex: 1;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      outline: none;
    }
    .input-bar textarea:focus {
      border-color: var(--accent);
    }
    .input-bar button {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .input-bar button:hover {
      background: var(--accent-ink);
    }
    .input-bar button:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    /* Scrollbar (subtle) */
    .chat::-webkit-scrollbar { width: 8px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <span class="brand">Pace <small>· PMP mentor for cc users</small></span>
      <span class="pill" id="status-pill">v0.1 stub</span>
    </header>

    <main class="chat" id="chat" aria-live="polite">
      <div class="msg system">
        Pace v0.1 — 真实的 PMP mentor 推断引擎尚未接入，下面是 stub 回复。
        随便问一句试试。
      </div>
    </main>

    <footer class="input-bar">
      <textarea id="input"
                placeholder="比如：我现在在 cc 里干啥？"
                rows="2"
                autofocus></textarea>
      <button id="send">发送</button>
    </footer>
  </div>

  <script src="./panel.js"></script>
</body>
</html>
